# AWS Amplify build configuration for Vite + React static export deployment
# Docs: https://docs.aws.amazon.com/amplify/latest/userguide/build-settings.html
#
# NOTE: This file is used when Amplify is connected to a Git repository (auto-deployment).
# For manual deployments via GitHub Actions, the buildSpec is defined in Pulumi.

version: 1
applications:
  - appRoot: apps/platform-frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --legacy-peer-deps
            - npm run build -w @viberglass/types
            - npm run build -w @viberglass/platform-ui -w @viberglass/integration-core
            - npm run build -w @viberglass/integration-bitbucket -w @viberglass/integration-custom -w @viberglass/integration-github -w @viberglass/integration-gitlab -w @viberglass/integration-jira -w @viberglass/integration-linear -w @viberglass/integration-monday -w @viberglass/integration-shortcut -w @viberglass/integration-slack

        build:
          commands:
            # Build the frontend package as static export
            - npm run build -w @viberglass/frontend

        postBuild:
          commands:
            # Verify static build output
            - ls -la dist
            - echo "Static build completed successfully"

      artifacts:
        baseDirectory: dist
        files:
          - "**/*"

      cache:
        paths:
          - node_modules/**/*
