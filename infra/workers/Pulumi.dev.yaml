# Development stack configuration for workers infrastructure
# Usage: pulumi stack select dev

config:
  # AWS region for all resources
  aws:region: eu-west-1
  viberglass-workers:awsRegion: eu-west-1
  # Environment name (dev, staging, prod)
  viberglass-workers:environment: dev
  # Base stack reference (REQUIRED)
  # Format: <organization>/<project>/<stack> or <project>/<stack>
  viberglass-workers:baseStack: organization/viberglass-base/dev
  # Enable Fargate Spot for cost savings (70% discount)
  # Workers may be interrupted with 2-minute notice
  viberglass-workers:enableSpot: "true"
  # Enable ECS Container Insights for enhanced monitoring
  viberglass-workers:containerInsights: "true"
  # Uploads/media bucket used by hosted workers
  viberglass-workers:uploadsBucketName: dev-viberglass-uploads
  # Prefix for ticket media objects in S3
  viberglass-workers:ticketMediaS3Prefix: ticket-media
