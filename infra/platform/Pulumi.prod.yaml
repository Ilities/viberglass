# Production stack configuration
# Usage: pulumi stack select prod && pulumi config set aws:region eu-west-1

encryptionsalt:
  - v1:YOUR_SALT_HERE

config:
  # AWS region for all resources
  aws:region: eu-west-1
  viberglass:awsRegion: eu-west-1

  # Environment name (dev, staging, prod)
  # Affects resource naming, log retention, and cost optimizations
  viberglass:environment: prod

  # Base stack reference (REQUIRED)
  # Format: organization/<project>/<stack> for S3 backends
  viberglass:baseStack: organization/viberglass-base/prod

  # Worker stack reference (OPTIONAL)
  # If set, enables automatic clanker ECS provisioning
  # Backend will automatically use worker infrastructure for creating clankers
  # Format: organization/<project>/<stack> for S3 backends
  # viberglass:workerStack: organization/viberglass-workers/prod

  # Enable Fargate Spot for cost savings (70% discount)
  # Disabled for production to ensure consistent performance
  viberglass:enableSpot: "false"

  # Enable ECS Container Insights for enhanced monitoring
  # Adds CloudWatch metrics for CPU/memory, network, storage
  # DISABLED to save costs (~$5-20/month per cluster)
  viberglass:containerInsights: "false"

  # =============================================================================
  # CUSTOM DOMAIN CONFIGURATION (Route53)
  # =============================================================================
  #
  # Prerequisites:
  #   1. Create a Route53 hosted zone for your domain (e.g., viberglass.io)
  #   2. Get the hosted zone ID from AWS Console -> Route53 -> Hosted zones
  #   3. Update your domain registrar to use Route53 nameservers
  #
  # Configuration:
  #   Set these values and run `pulumi up` - everything is automated:
  #
  # viberglass:apiDomain: api.viberglass.io
  # viberglass:appDomain: app.viberglass.io
  # viberglass:route53ZoneId: Z1234567890ABC
  #
  # What gets created automatically:
  #   - ACM certificate for api.viberglass.io (DNS validated)
  #   - Route53 alias record: api.viberglass.io -> ALB
  #   - HTTPS listener on ALB (port 443)
  #   - Amplify custom domain for app.viberglass.io
  #   - Route53 CNAME record: app.viberglass.io -> CloudFront
  #   - Route53 validation record for Amplify SSL certificate

  # Optional: Override database instance class
  # Default: db.m6g.xlarge for production
  # Valid values: db.m6g.xlarge, db.m6g.2xlarge, etc.
  # viberglass:dbInstanceClass: db.m6g.xlarge

  # Optional: Override database storage in GB
  # Default: 100 for production
  # viberglass:dbAllocatedStorage: 100

  # Optional: Single NAT gateway for cost savings
  # Default: true for dev/staging, false for prod (multi-NAT for HA)
  # viberglass:singleNatGateway: "false"

  # Optional: CloudWatch log retention in days
  # Default: 7 for dev, 30 for staging, 90 for prod
  # viberglass:logRetentionDays: 90
