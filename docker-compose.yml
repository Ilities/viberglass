# viberglass Development Environment
# One-command local development: docker compose up
#
# This compose file starts all services (postgres, backend, frontend)
# with proper dependency ordering, health checks, and hot-reload support.
#
# Usage:
#   docker compose up -d          # Start all services in background
#   docker compose up             # Start all services with logs
#   docker compose down           # Stop and remove containers
#   docker compose ps             # Show running services
#   docker compose logs backend   # Show backend logs
#
# Port Conflicts:
# If you have PostgreSQL already running on the host, you may see
# "port is already allocated" errors. Options:
#   1. Stop the host service temporarily: sudo systemctl stop postgresql
#   2. Change the host port mapping below (e.g., "5433:5432" for postgres)
#   3. Remove the ports section entirely (services still accessible within Docker network)

networks:
  viberglass-dev-network:
    name: viberglass-dev-network

volumes:
  postgres-data:
    name: viberglass-postgres-data

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: viberglass-dev-postgres
    environment:
      POSTGRES_DB: viberglass-platform
      POSTGRES_USER: jussi
      POSTGRES_PASSWORD: salasana
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jussi -d viberglass-platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - viberglass-dev-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: apps/platform-backend/Dockerfile.dev
    container_name: viberglass-dev-backend
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: viberglass-platform
      DB_USER: jussi
      DB_PASSWORD: salasana
      POSTGRES_DB: viberglass-platform
      POSTGRES_USER: jussi
      POSTGRES_PASSWORD: salasana
      RUN_MIGRATIONS_ON_STARTUP: "true"
      # Node
      NODE_ENV: development
      PORT: 8888
      LOG_LEVEL: debug
      # Ticket media local storage (used by Docker clanker file mounts)
      TICKET_MEDIA_DISK_ROOT: /tmp/viberglass-ticket-media
      TICKET_MEDIA_CONTAINER_ROOT: /tmp/viberglass-ticket-media
      SECRETS_ENCRYPTION_KEY: 'very-berry-secret-key'
      PLATFORM_FRONTEND_URL: http://localhost:3000
      # Hot-reload in containers (required for some Docker setups)
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "8888:8888"
    volumes:
      # Mount source with cached mode for better performance on macOS/Windows
      - ./apps/platform-backend:/app/apps/platform-backend:cached
      - ./packages/types:/app/packages/types:cached
      # Persist ticket media files on host disk for Docker strategy mounts
      - /tmp/viberglass-ticket-media:/tmp/viberglass-ticket-media
      # Docker socket for provisioning clanker containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Worker Dockerfiles and source needed for clanker provisioning
      - ./infra:/app/infra:cached
      - ./apps/viberator:/app/apps/viberator:cached
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - viberglass-dev-network
    restart: unless-stopped

  # Frontend (Vite + React)
  frontend:
    build:
      context: .
      dockerfile: apps/platform-frontend/Dockerfile.dev
    container_name: viberglass-dev-frontend
    environment:
      # Backend API URL (from host perspective)
      VITE_API_URL: http://localhost:8888
      NODE_ENV: development
      # Hot-reload in containers
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      # Mount source with cached mode for better performance
      - ./apps/platform-frontend:/app/apps/platform-frontend:cached
      - ./packages/types:/app/packages/types:cached
    depends_on:
      backend:
        condition: service_started
    networks:
      - viberglass-dev-network
    restart: unless-stopped
