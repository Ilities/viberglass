# DEPRECATED: Use docker-compose.yml at repository root instead
# The root docker-compose.yml provides a complete development environment
# with postgres, redis, backend, and frontend services.
#
# This file is kept for reference but should not be used for new development.
# To start all services: docker compose up (from repository root)

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: viberator-platform
      POSTGRES_USER: jussi
      POSTGRES_PASSWORD: salasana
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    scale: 0
    build:
      dockerfile: Dockerfile
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
