version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: viberator-e2e-postgres
    environment:
      POSTGRES_DB: viberator
      POSTGRES_USER: viberator
      POSTGRES_PASSWORD: viberator
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viberator"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: viberator-e2e-localstack
    environment:
      SERVICES: s3,sqs,lambda
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
    ports:
      - "4566:4566"
    volumes:
      - "./localstack-data:/tmp/localstack/data"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  default:
    name: viberator-e2e-network
