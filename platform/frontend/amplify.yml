# AWS Amplify build configuration for Next.js 15 SSR deployment
# Docs: https://docs.aws.amazon.com/amplify/latest/userguide/build-settings.html

version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install dependencies with workspace support
        - npm ci --legacy-peer-deps

    build:
      commands:
        # Build Next.js application for SSR
        - npm run build

    postBuild:
      commands:
        # Verify build output structure
        - ls -la .next
        - echo "Build completed successfully"

  artifacts:
    # Important: Amplify Next.js SSR uses the .next directory, not static files
    # These artifacts are for debugging only - actual deployment uses .next
    baseDirectory: .next
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

  # Amplify automatically detects Next.js and configures Lambda@Edge
  # No custom rewrites/redirects needed for Next.js SSR
