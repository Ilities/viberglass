# Backend CI Workflow
# Runs tests and TypeScript compilation on pull requests affecting backend code
name: Backend CI

on:
  pull_request:
    paths:
      - 'apps/platform-backend/**'
      - 'packages/types/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Test and Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build types package
        run: npm run build -w @viberglass/types

      - name: Run unit tests
        run: npm run test:unit -w @viberglass/platform-backend

      - name: TypeScript compilation check
        run: npm run build -w @viberglass/platform-backend

      - name: Runtime startup smoke check
        run: npm run smoke:start -w @viberglass/platform-backend
