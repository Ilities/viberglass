# Frontend deployment workflow for staging environment
# Manual trigger via workflow_dispatch for staging deployments

name: Deploy Frontend (Staging)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: false
        default: 'Manual staging deployment'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Staging (Amplify)
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.amplify.outputs.appUrl }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get deployment config from SSM
        id: get-config
        run: |
          # Get AWS region from SSM
          AWS_REGION=$(aws ssm get-parameter \
            --name "/viberator/staging/deployment/region" \
            --query Parameter.Value \
            --output text 2>/dev/null || echo "us-east-1")

          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_ENV

          # Get backend API URL from SSM
          API_URL=$(aws ssm get-parameter \
            --name "/viberator/staging/frontend/apiUrl" \
            --query Parameter.Value \
            --output text)

          if [ -z "$API_URL" ]; then
            echo "::error::Backend API URL not found in SSM at /viberator/staging/frontend/apiUrl"
            exit 1
          fi

          echo "backendUrl=$API_URL" >> $GITHUB_OUTPUT
          echo "NEXT_PUBLIC_API_URL=$API_URL" >> $GITHUB_ENV

      - name: Build frontend with environment variables
        run: npm run build -w @viberglass/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.get-config.outputs.backendUrl }}

      - name: Start Amplify deployment
        id: amplify
        run: |
          # Get Amplify configuration from SSM (provisioned by Pulumi)
          APP_ID=$(aws ssm get-parameter \
            --name "/viberator/staging/amplify/appId" \
            --query Parameter.Value \
            --output text)

          BRANCH_NAME=$(aws ssm get-parameter \
            --name "/viberator/staging/amplify/branchName" \
            --query Parameter.Value \
            --output text)

          REGION=$(aws ssm get-parameter \
            --name "/viberator/staging/amplify/region" \
            --query Parameter.Value \
            --output text)

          if [ -z "$APP_ID" ] || [ -z "$BRANCH_NAME" ] || [ -z "$REGION" ]; then
            echo "::error::Amplify configuration not found in SSM. Run pulumi up first."
            exit 1
          fi

          echo "Starting Amplify deployment for app: $APP_ID, branch: $BRANCH_NAME, region: $REGION"
          echo "Reason: ${{ inputs.reason }}"

          # Trigger Amplify deployment using AWS CLI
          DEPLOYMENT_ID=$(aws amplify start-deployment \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$REGION" \
            --source-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --query 'jobSummary.id' \
            --output text)

          echo "Deployment started with ID: $DEPLOYMENT_ID"
          echo "deploymentId=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "deploymentTriggered=true" >> $GITHUB_OUTPUT
          echo "amplifyRegion=$REGION" >> $GITHUB_OUTPUT

          # Get the app URL for environment linking
          APP_URL=$(aws amplify get-app \
            --app-id "$APP_ID" \
            --region "$REGION" \
            --query 'app.defaultDomain' \
            --output text)

          echo "appUrl=https://$APP_URL" >> $GITHUB_OUTPUT

      - name: Wait for Amplify deployment to complete
        if: steps.amplify.outputs.deploymentTriggered == 'true'
        run: |
          # Get Amplify configuration from SSM (provisioned by Pulumi)
          APP_ID=$(aws ssm get-parameter \
            --name "/viberator/staging/amplify/appId" \
            --query Parameter.Value \
            --output text)

          BRANCH_NAME=$(aws ssm get-parameter \
            --name "/viberator/staging/amplify/branchName" \
            --query Parameter.Value \
            --output text)

          REGION=$(aws ssm get-parameter \
            --name "/viberator/staging/amplify/region" \
            --query Parameter.Value \
            --output text)

          DEPLOYMENT_ID=${{ steps.amplify.outputs.deploymentId }}

          echo "Waiting for deployment $DEPLOYMENT_ID to complete..."
          TIMEOUT=600  # 10 minutes
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --region "$REGION" \
              --job-id "$DEPLOYMENT_ID" \
              --query 'job.summary.status' \
              --output text)

            echo "Current status: $STATUS"

            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✓ Staging deployment succeeded"
              exit 0
            elif [ "$STATUS" = "FAIL" ]; then
              echo "✗ Staging deployment failed"
              aws amplify get-job \
                --app-id "$APP_ID" \
                --branch-name "$BRANCH_NAME" \
                --region "$REGION" \
                --job-id "$DEPLOYMENT_ID" \
                --query 'job.summary' \
                --output table
              exit 1
            elif [ "$STATUS" = "TIMEDOUT" ]; then
              echo "✗ Staging deployment timed out"
              exit 1
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          echo "::warning::Deployment wait timed out after $TIMEOUT seconds"
          exit 1

      - name: Deployment summary
        if: steps.amplify.outputs.deploymentTriggered == 'true'
        run: |
          echo "### :white_check_mark: Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | ${{ steps.amplify.outputs.appUrl }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment ID** | ${{ steps.amplify.outputs.deploymentId }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | ${{ inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please verify the staging deployment at: ${{ steps.amplify.outputs.appUrl }}" >> $GITHUB_STEP_SUMMARY
