# Frontend deployment workflow for production environment
# Uses Git-based auto-deployment with GitHub environment approval gate
#
# HOW IT WORKS:
# 1. Push to main branch triggers this workflow
# 2. The workflow requires approval via the 'prod' GitHub environment
# 3. Once approved, Amplify's git integration automatically builds and deploys
# 4. This workflow runs tests/validation while Amplify handles the actual deployment

name: Deploy Frontend (Production)

on:
  push:
    branches: [main]
    paths:
      - 'apps/platform-frontend/**'
      - 'packages/types/**'
      - '.github/workflows/deploy-frontend-prod.yml'
      - 'package*.json'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason (for manual trigger)'
        required: false
        type: string
        default: 'Manual deployment'

permissions:
  id-token: write
  contents: read

jobs:
  # Pre-deployment checks - run tests and validation
  validate:
    name: Validate Production Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build shared packages
        run: npm run build -w @viberglass/types

      - name: Lint frontend
        run: npm run lint -w @viberglass/frontend

      - name: Build frontend (validation)
        run: npm run build -w @viberglass/frontend
        env:
          # Use a placeholder API URL for build validation
          NEXT_PUBLIC_API_URL: https://api.placeholder.local

  # Production deployment approval gate
  # This job requires manual approval via GitHub environment protection rules
  deploy:
    name: Approve Production Deployment
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: prod
      url: ${{ steps.get-url.outputs.appUrl }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Get Amplify app URL
        id: get-url
        run: |
          # Get Amplify configuration from SSM
          APP_ID=$(aws ssm get-parameter \
            --name "/viberglass/prod/amplify/appId" \
            --query Parameter.Value \
            --output text)

          REGION=$(aws ssm get-parameter \
            --name "/viberglass/prod/amplify/region" \
            --query Parameter.Value \
            --output text)

          if [ -n "$APP_ID" ] && [ -n "$REGION" ]; then
            APP_URL=$(aws amplify get-app \
              --app-id "$APP_ID" \
              --region "$REGION" \
              --query 'app.defaultDomain' \
              --output text)
            echo "appUrl=https://$APP_URL" >> $GITHUB_OUTPUT
          else
            echo "appUrl=https://prod.viberglass.app" >> $GITHUB_OUTPUT
          fi

      - name: Deployment summary
        run: |
          echo "### :rocket: Production Deployment Approved" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | ${{ steps.get-url.outputs.appUrl }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Approved by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> :information_source: Amplify will automatically build and deploy from git." >> $GITHUB_STEP_SUMMARY
          echo "> Monitor the deployment at: ${{ steps.get-url.outputs.appUrl }}" >> $GITHUB_STEP_SUMMARY
