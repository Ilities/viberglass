# Backend Dev Deployment Workflow
# Automatically deploys backend to dev environment on push to main branch
name: Deploy Backend (Dev)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/platform-backend/**'
      - 'packages/types/**'
      - '.github/workflows/deploy-backend-dev.yml'
      - 'apps/platform-backend/Dockerfile.prod'

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read    # Required for checkout

env:
  ENVIRONMENT: dev

jobs:
  deploy:
    name: Build and Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Get deployment config from SSM
        id: get-config
        run: |
          # Fetch deployment configuration
          AWS_REGION=$(aws ssm get-parameter --name "/viberglass/dev/deployment/region" --query Parameter.Value --output text 2>/dev/null || echo "eu-west-1")
          ECR_REPOSITORY=$(aws ssm get-parameter --name "/viberglass/dev/deployment/ecrRepository" --query Parameter.Value --output text 2>/dev/null || echo "${ENVIRONMENT}-viberglass-repo")
          ECS_CLUSTER=$(aws ssm get-parameter --name "/viberglass/dev/ecs/cluster" --query Parameter.Value --output text 2>/dev/null || echo "${ENVIRONMENT}-viberglass-backend-cluster")
          ECS_SERVICE=$(aws ssm get-parameter --name "/viberglass/dev/ecs/service" --query Parameter.Value --output text 2>/dev/null || echo "${ENVIRONMENT}-viberglass-backend")

          echo "aws_region=$AWS_REGION" >> $GITHUB_OUTPUT
          echo "ecr_repository=$ECR_REPOSITORY" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$ECS_CLUSTER" >> $GITHUB_OUTPUT
          echo "ecs_service=$ECS_SERVICE" >> $GITHUB_OUTPUT
          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=$ECR_REPOSITORY" >> $GITHUB_ENV
          echo "ECS_CLUSTER=$ECS_CLUSTER" >> $GITHUB_ENV
          echo "ECS_SERVICE=$ECS_SERVICE" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/platform-backend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Get DATABASE_URL from SSM
        id: get-db-url
        run: |
          DB_URL=$(aws ssm get-parameter \
            --name "/viberglass/${{ env.ENVIRONMENT }}/database/url" \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV

      - name: Run database migrations
        run: |
          npm ci --legacy-peer-deps
          npm run migrate:latest -w @viberglass/platform-backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Register new task definition
        id: register-task
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query 'taskDefinition' \
            --output json)
          echo "$TASK_DEF" > task-definition.json
          # Update image URI in task definition
          NEW_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          jq --arg image "$NEW_IMAGE" '.containerDefinitions[0].image = $image' task-definition.json > task-definition-updated.json
          # Register new task definition revision
          aws ecs register-task-definition \
            --cli-input-json file://task-definition-updated.json > task-definition-registered.json
          NEW_TASK_DEF_ARN=$(jq -r '.taskDefinition.taskDefinitionArn' task-definition-registered.json)
          echo "task_definition_arn=$NEW_TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.register-task.outputs.task_definition_arn }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment summary
        run: |
          echo "### Deployed to Dev :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ env.ECS_SERVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** ${{ env.ECS_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Task Definition:** ${{ steps.register-task.outputs.task_definition_arn }}" >> $GITHUB_STEP_SUMMARY
