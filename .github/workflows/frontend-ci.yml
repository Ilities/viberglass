# Frontend CI workflow for PR validation
# Runs on pull requests affecting frontend code to verify lint, tests, and build

name: Frontend CI

on:
  pull_request:
    paths:
      - 'apps/platform-frontend/**'
      - 'packages/types/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  ci:
    name: Frontend Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build types package
        run: npm run build -w @viberglass/types

      - name: Run lint
        run: npm run lint -w @viberglass/frontend

      - name: Run unit tests
        run: npm run test:unit -w @viberglass/frontend
        continue-on-error: true  # Don't fail CI if tests don't exist yet

      - name: Build frontend
        run: npm run build -w @viberglass/frontend
