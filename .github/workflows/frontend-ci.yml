# Frontend CI workflow for PR validation
# Runs on pull requests affecting frontend code to verify lint, tests, and build

name: Frontend CI

on:
  pull_request:
    paths:
      - 'apps/platform-frontend/**'
      - 'packages/types/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  ci:
    name: Frontend Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint -w @viberglass/frontend

      - name: Run unit tests
        run: npm run test:unit -w @viberglass/frontend
        continue-on-error: true  # Don't fail CI if tests don't exist yet

      - name: Build frontend (verify SSR build)
        run: npm run build -w @viberglass/frontend
        env:
          # Use placeholder API URL for CI build verification
          NEXT_PUBLIC_API_URL: https://api.example.com

      - name: Verify build output
        run: |
          echo "Verifying SSR build structure..."
          ls -la apps/platform-frontend/.next
          if [ -d "apps/platform-frontend/.next/server" ]; then
            echo "✓ Server-side rendering build output found"
          else
            echo "✗ Missing .next/server directory"
            exit 1
          fi
