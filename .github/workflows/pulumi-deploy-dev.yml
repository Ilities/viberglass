# Pulumi Dev Deployment Workflow
# Automatically deploys infrastructure changes to dev on main merge

name: Pulumi Deploy (Dev)

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: pulumi-deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Infrastructure to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install Pulumi CLI
        uses: pulumi/setup-pulumi@v3

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Run Pulumi up (dev stack)
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: dev
          work-dir: infrastructure
          diff: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Upload stack outputs
        if: always()
        run: |
          echo "Dev stack deployment completed"
          echo "Check Pulumi Cloud for full stack outputs: https://app.pulumi.com/"
