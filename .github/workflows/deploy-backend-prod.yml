# Backend Production Deployment Workflow
# Manually deploys backend to production environment with approval gate
name: Deploy Backend (Production)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm production deployment'
        required: true
        default: 'NO'
        type: choice
        options:
          - NO
          - YES

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read    # Required for checkout

env:
  ENVIRONMENT: prod

jobs:
  confirm-deployment:
    name: Confirm Deployment
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm != 'YES'
    steps:
      - name: Abort deployment
        run: |
          echo "::error::Deployment aborted. Please set 'confirm' to YES to proceed."
          exit 1

  deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    needs: confirm-deployment
    if: github.event.inputs.confirm == 'YES'
    environment:
      name: prod
      url: https://${{ env.ECS_CLUSTER }}.elb.${{ env.AWS_REGION }}.amazonaws.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Get deployment config from SSM
        id: get-config
        run: |
          # Fetch deployment configuration
          AWS_REGION=$(aws ssm get-parameter --name "/viberglass/prod/deployment/region" --query Parameter.Value --output text 2>/dev/null || echo "eu-west-1")
          ECR_REPOSITORY=$(aws ssm get-parameter --name "/viberglass/prod/deployment/ecrRepository" --query Parameter.Value --output text 2>/dev/null || echo "${ENVIRONMENT}-viberglass-repo")
          ECS_CLUSTER=$(aws ssm get-parameter --name "/viberglass/prod/ecs/cluster" --query Parameter.Value --output text 2>/dev/null || echo "${ENVIRONMENT}-viberglass-backend-cluster")
          ECS_SERVICE=$(aws ssm get-parameter --name "/viberglass/prod/ecs/service" --query Parameter.Value --output text 2>/dev/null || echo "${ENVIRONMENT}-viberglass-backend")

          echo "aws_region=$AWS_REGION" >> $GITHUB_OUTPUT
          echo "ecr_repository=$ECR_REPOSITORY" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$ECS_CLUSTER" >> $GITHUB_OUTPUT
          echo "ecs_service=$ECS_SERVICE" >> $GITHUB_OUTPUT
          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=$ECR_REPOSITORY" >> $GITHUB_ENV
          echo "ECS_CLUSTER=$ECS_CLUSTER" >> $GITHUB_ENV
          echo "ECS_SERVICE=$ECS_SERVICE" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/platform-backend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify pushed image digest in ECR
        run: |
          aws ecr describe-images \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageDigest="${{ steps.build-image.outputs.digest }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text

      - name: Register new task definition
        id: register-task
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query 'taskDefinition' \
            --output json)
          echo "$TASK_DEF" > task-definition.json
          # Update image URI in task definition
          NEW_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build-image.outputs.digest }}"
          jq --arg image "$NEW_IMAGE" 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | .containerDefinitions[0].image = $image' task-definition.json > task-definition-updated.json
          # Register new task definition revision
          aws ecs register-task-definition \
            --cli-input-json file://task-definition-updated.json > task-definition-registered.json
          NEW_TASK_DEF_ARN=$(jq -r '.taskDefinition.taskDefinitionArn' task-definition-registered.json)
          echo "task_definition_arn=$NEW_TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS service with extended stability wait
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "${{ steps.register-task.outputs.task_definition_arn }}"

      - name: Wait for ECS service to stabilize
        run: |
          echo "Waiting for ECS service to reach stable state..."
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"
          echo "ECS service is stable"

      - name: Get ALB endpoint
        id: get-alb
        run: |
          # Get ALB DNS from SSM or ECS service
          ALB_DNS=$(aws ssm get-parameter \
            --name "/viberglass/prod/alb/dns" \
            --query Parameter.Value \
            --output text 2>/dev/null || echo "")

          if [ -z "$ALB_DNS" ]; then
            echo "Warning: ALB DNS not found in SSM, using cluster name"
            ALB_DNS="${{ env.ECS_CLUSTER }}.elb.${{ env.AWS_REGION }}.amazonaws.com"
          fi

          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "API_URL=https://$ALB_DNS" >> $GITHUB_ENV

      - name: Verify backend health endpoint
        run: |
          echo "Verifying backend health at ${{ env.API_URL }}/health"

          for i in {1..30}; do
            if curl -f -s "${{ env.API_URL }}/health"; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 failed, waiting 10 seconds..."
            sleep 10
          done

          echo "❌ Health check failed after 5 minutes"
          exit 1

      - name: Test critical API endpoints
        run: |
          echo "Testing critical API endpoints..."

          # Test projects endpoint (should return 200 or 401, not 5xx)
          PROJECT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.API_URL }}/api/projects" \
            -H "X-Tenant-Id: smoke-test")

          if [[ "$PROJECT_STATUS" =~ ^(200|401|403)$ ]]; then
            echo "✅ Projects endpoint responding: $PROJECT_STATUS"
          else
            echo "❌ Projects endpoint returned unexpected status: $PROJECT_STATUS"
            exit 1
          fi

          # Test API version endpoint
          VERSION_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.API_URL }}/api/version")

          if [[ "$VERSION_STATUS" =~ ^(200)$ ]]; then
            echo "✅ Version endpoint responding: $VERSION_STATUS"
          else
            echo "❌ Version endpoint returned unexpected status: $VERSION_STATUS"
            exit 1
          fi

          echo "✅ All critical endpoints responding correctly"

      - name: Check ECS task count
        run: |
          echo "Verifying ECS task count..."

          RUNNING_TASKS=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0].runningCount' \
            --output text)

          DESIRED_TASKS=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0].desiredCount' \
            --output text)

          echo "Running tasks: $RUNNING_TASKS"
          echo "Desired tasks: $DESIRED_TASKS"

          if [ "$RUNNING_TASKS" -ge "$DESIRED_TASKS" ]; then
            echo "✅ Task count is healthy"
          else
            echo "⚠️ Warning: Running tasks ($RUNNING_TASKS) is less than desired ($DESIRED_TASKS)"
          fi

      - name: Deployment summary
        run: |
          echo "### Deployed to Production :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image digest:** ${{ steps.build-image.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed image ref:** ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build-image.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ env.ECS_SERVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** ${{ env.ECS_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Task Definition:** ${{ steps.register-task.outputs.task_definition_arn }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API URL:** ${{ env.API_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed successfully and passed all smoke tests." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monitor logs in CloudWatch: https://console.aws.amazon.com/cloudwatch" >> $GITHUB_STEP_SUMMARY
