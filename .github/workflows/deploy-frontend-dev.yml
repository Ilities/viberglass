# Frontend deployment workflow for dev environment
# Triggers Amplify deployment on push to main branch

name: Deploy Frontend (Dev)

on:
  push:
    branches: [main]
    paths:
      - 'apps/platform-frontend/**'
      - 'packages/types/**'
      - '.github/workflows/deploy-frontend-dev.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Dev (Amplify)
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ steps.amplify.outputs.appUrl }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Get deployment config from SSM
        id: get-config
        run: |
          # Get AWS region from SSM
          AWS_REGION=$(aws ssm get-parameter \
            --name "/viberglass/dev/deployment/region" \
            --query Parameter.Value \
            --output text 2>/dev/null || echo "eu-west-1")

          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_ENV

          # Get backend API URL from SSM
          API_URL=$(aws ssm get-parameter \
            --name "/viberglass/dev/frontend/apiUrl" \
            --query Parameter.Value \
            --output text)

          if [ -z "$API_URL" ]; then
            echo "::error::Backend API URL not found in SSM at /viberglass/dev/frontend/apiUrl"
            exit 1
          fi

          echo "backendUrl=$API_URL" >> $GITHUB_OUTPUT
          echo "VITE_API_URL=$API_URL" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build shared packages
        run: npm run build -w @viberglass/types

      - name: Build frontend (validation)
        run: npm run build -w @viberglass/frontend
        env:
          VITE_API_URL: ${{ steps.get-config.outputs.backendUrl }}

      - name: Deployment summary
        run: |
          echo "### :rocket: Dev Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | ${{ steps.get-url.outputs.appUrl }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Approved by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> :information_source: Amplify will automatically build and deploy from git." >> $GITHUB_STEP_SUMMARY
          echo "> Monitor the deployment at: ${{ steps.get-url.outputs.appUrl }}" >> $GITHUB_STEP_SUMMARY
