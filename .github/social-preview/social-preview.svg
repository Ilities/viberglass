<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#2a1a0a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </radialGradient>

    <!-- Logo gradients -->
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4520a"/>
      <stop offset="100%" stop-color="#e8923e"/>
    </linearGradient>
    <linearGradient id="batonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8923e"/>
      <stop offset="100%" stop-color="#c9a869"/>
    </linearGradient>

    <!-- Text gradients -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4520a"/>
      <stop offset="45%" stop-color="#e8923e"/>
      <stop offset="100%" stop-color="#c9a869"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>

    <!-- Top dashed border -->
    <pattern id="dash" width="16" height="6" patternUnits="userSpaceOnUse">
      <rect width="10" height="6" rx="1" fill="#d4520a"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGlow)"/>

  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Top dashed accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#dash)"/>

  <!-- Logo (scaled up from 32x32 to ~180x180, centered at x=640, y=240) -->
  <g transform="translate(550, 120) scale(5.6)">
    <path d="M 6,11 Q 10,8 14,11 T 22,11 T 26,11" stroke="url(#waveGradient)" fill="none" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 6,16 Q 10,13 14,16 T 22,16 T 26,16" stroke="url(#waveGradient)" fill="none" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 6,21 Q 10,18 14,21 T 22,21 T 26,21" stroke="url(#waveGradient)" fill="none" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="12" y1="20" x2="20" y2="12" stroke="url(#batonGradient)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="12" r="2" fill="#e8923e"/>
    <circle cx="16" cy="16" r="1.5" fill="#f5e6d3"/>
  </g>

  <!-- Title: VIBERGLASS -->
  <text x="640" y="420" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="96" letter-spacing="4" fill="url(#titleGradient)">VIBERGLASS</text>

  <!-- Tagline -->
  <text x="640" y="472" text-anchor="middle" font-family="'Inter', 'Georgia', serif" font-style="italic" font-size="28" fill="#c9a869" opacity="0.85">Tickets that fix themselves.</text>

  <!-- Divider line -->
  <line x1="420" y1="498" x2="860" y2="498" stroke="#d4520a" stroke-width="1.5" opacity="0.5"/>

  <!-- Badges -->
  <!-- Badge 1: Zero Lock-In -->
  <g transform="translate(330, 520)">
    <rect x="0" y="0" width="160" height="38" rx="4" fill="none" stroke="#c9a869" stroke-width="1.2" opacity="0.7"/>
    <text x="80" y="25" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="17" fill="#c9a869">Zero Lock-In</text>
  </g>

  <!-- Badge 2: No IDE Required -->
  <g transform="translate(510, 520)">
    <rect x="0" y="0" width="175" height="38" rx="4" fill="none" stroke="#c9a869" stroke-width="1.2" opacity="0.7"/>
    <text x="87" y="25" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="17" fill="#c9a869">No IDE Required</text>
  </g>

  <!-- Badge 3: Self-Hosted -->
  <g transform="translate(705, 520)">
    <rect x="0" y="0" width="150" height="38" rx="4" fill="none" stroke="#c9a869" stroke-width="1.2" opacity="0.7"/>
    <text x="75" y="25" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="17" fill="#c9a869">Self-Hosted</text>
  </g>

  <!-- Badge 4: Open Source -->
  <g transform="translate(875, 520)">
    <rect x="0" y="0" width="155" height="38" rx="4" fill="none" stroke="#c9a869" stroke-width="1.2" opacity="0.7"/>
    <text x="77" y="25" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="17" fill="#c9a869">Open Source</text>
  </g>
</svg>
